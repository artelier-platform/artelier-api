6,659.6178 1421.958,654.2773 C1417.1021,659.9515 1412.5425,658.9514 1410.0644,652.0317 C1403.9072,655.782 1399.9506,655.0934 1397.9233,647.5801 C1392.6207,653.1783 1386.6012,651.0702 1384.7403,643.999 C1377.5158,642.5645 1374.2327,637.0159 1379.8092,630.7992 C1374.9544,622.8784 1377.3981,618.0549 1386.4445,616.6556" fill="#FAEEDA" style="stroke:#854F0B;stroke-width:1;"/><text fill="#412402" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="57.3633" x="1391.5" y="634.3633">Cloudinary</text></g><!--entity WOMPIAPI--><g class="entity" data-qualified-name="WOMPIAPI" data-source-line="135" id="ent0059"><path d="M2665.5715,707.101 C2668.666,701.24 2673.5356,699.5142 2678.5312,704.9128 C2680.4303,698.4244 2685.913,698.5981 2689.9226,702.6267 C2692.6915,696.1102 2697.3338,693.4151 2703.1448,699.4123 C2707.2493,695.7292 2711.2006,696.0365 2713.5335,701.4381 C2718.7648,696.8373 2724.6401,698.549 2725.7741,705.7042 C2730.3414,698.4164 2736.5877,698.6178 2740.1981,706.6076 C2749.0589,707.8416 2752.0131,713.3965 2746.3036,720.8685 C2750.2102,728.0938 2749.1965,733.3383 2739.9598,734.4033 C2738.1365,741.6773 2731.2636,744.0785 2725.8822,738.2164 C2724.2875,743.9724 2719.2704,744.9353 2715.2364,740.8568 C2712.5173,747.7708 2707.8145,749.0755 2702.1154,744.163 C2696.2083,749.3763 2691.5764,748.4049 2689.0277,740.7479 C2683.9459,745.2471 2679.876,744.9372 2677.5966,737.9572 C2672.0941,742.9599 2666.8914,740.0105 2665.7899,733.4598 C2658.7155,730.6725 2659.4548,725.8169 2664.0047,721.3202 C2657.8213,715.6199 2657.8349,711.2674 2665.5715,707.101" fill="#FAEEDA" style="stroke:#854F0B;stroke-width:1;"/><text fill="#412402" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="60.0117" x="2671" y="723.8633">Wompi API</text></g><g class="entity" data-qualified-name="GMN136" data-source-line="246" id="ent0137"><path d="M2734,124 L2734,223.375 L2926.2109,223.375 L2926.2109,134 L2916.2109,124 L2734,124" fill="#F9F8F4" style="stroke:#D3D1C7;stroke-width:1;"/><path d="M2916.2109,124 L2916.2109,134 L2926.2109,134 L2916.2109,124" fill="#F9F8F4" style="stroke:#D3D1C7;stroke-width:1;"/><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="145.0977" x="2740" y="138.0527">Intercepta toda request entrante.</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="142.8125" x="2740" y="149.2246">Extrae y valida JWT con JwtUtil.</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="155.6201" x="2740" y="160.3965">Carga User desde UserRepository.</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="171.2109" x="2740" y="171.5684">Verifica ban &#8212; responde 401 si aplica.</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="160.6201" x="2740" y="182.7402">Construye UserPrincipal y lo inyecta</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="143.4131" x="2740" y="193.9121">en el SecurityContext de Spring.</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="152.8711" x="2740" y="205.084">Requests sin header Authorization</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="146.7432" x="2740" y="216.2559">pasan al filtro de Spring Security.</text></g><g class="entity" data-qualified-name="GMN139" data-source-line="257" id="ent0140"><path d="M2956.5,129.5 L2956.5,217.7031 L3149.248,217.7031 L3149.248,139.5 L3139.248,129.5 L2956.5,129.5" fill="#F9F8F4" style="stroke:#D3D1C7;stroke-width:1;"/><path d="M3139.248,129.5 L3139.248,139.5 L3149.248,139.5 L3139.248,129.5" fill="#F9F8F4" style="stroke:#D3D1C7;stroke-width:1;"/><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="163.5547" x="2962.5" y="143.5527">@RestControllerAdvice centralizado.</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="171.748" x="2962.5" y="154.7246">Maneja: ArtelierException y subclases,</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="161.2012" x="2962.5" y="165.8965">MethodArgumentNotValidException,</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="130.6299" x="2962.5" y="177.0684">ConstraintViolationException,</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="110.6152" x="2962.5" y="188.2402">AccessDeniedException,</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="163.9844" x="2962.5" y="199.4121">HttpMessageNotReadableException,</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="168.418" x="2962.5" y="210.584">WompiException, Exception gen&#233;rica.</text></g><g class="entity" data-qualified-name="GMN142" data-source-line="267" id="ent0143"><path d="M2734,263 L2734,328.8594 L2929.5557,328.8594 L2929.5557,273 L2919.5557,263 L2734,263" fill="#F9F8F4" style="stroke:#D3D1C7;stroke-width:1;"/><path d="M2919.5557,263 L2919.5557,273 L2929.5557,273 L2919.5557,263" fill="#F9F8F4" style="stroke:#D3D1C7;stroke-width:1;"/><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="169.5313" x="2740" y="277.0527">POST /payments/webhook es p&#250;blico.</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="147.8418" x="2740" y="288.2246">WompiSignatureValidator verifica</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="173.9746" x="2740" y="299.3965">checksum SHA-256 antes de procesar.</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="174.5557" x="2740" y="310.5684">Eventos distintos a transaction.updated</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="105.0684" x="2740" y="321.7402">se ignoran con 200 OK.</text></g><g class="entity" data-qualified-name="GMN145" data-source-line="275" id="ent0146"><path d="M2960,371.5 L2960,448.5313 L3168.334,448.5313 L3168.334,381.5 L3158.334,371.5 L2960,371.5" fill="#F9F8F4" style="stroke:#D3D1C7;stroke-width:1;"/><path d="M3158.334,371.5 L3158.334,381.5 L3168.334,381.5 L3158.334,371.5" fill="#F9F8F4" style="stroke:#D3D1C7;stroke-width:1;"/><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="143.96" x="2966" y="385.5527">Coordina con OrderService para</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="140.0879" x="2966" y="396.7246">transicionar estado de la orden.</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="157.8516" x="2966" y="407.8965">WompiIntegritySignatureUtil genera</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="152.8467" x="2966" y="419.0684">la firma de integridad para Wompi.</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="179.5313" x="2966" y="430.2402">WompiAcceptanceTokenService cachea</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="187.334" x="2966" y="441.4121">tokens con @Cacheable("wompiTokens").</text></g><g class="entity" data-qualified-name="GMN148" data-source-line="284" id="ent0149"><path d="M2734,382.5 L2734,437.1875 L2930.0928,437.1875 L2930.0928,392.5 L2920.0928,382.5 L2734,382.5" fill="#F9F8F4" style="stroke:#D3D1C7;stroke-width:1;"/><path d="M2920.0928,382.5 L2920.0928,392.5 L2930.0928,392.5 L2920.0928,382.5" fill="#F9F8F4" style="stroke:#D3D1C7;stroke-width:1;"/><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="161.7383" x="2740" y="396.5527">Lo