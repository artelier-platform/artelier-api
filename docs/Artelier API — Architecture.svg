-width:1;"/><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="143.9648" x="932.5" y="726.3799">Schema gestionado con Flyway.</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="119.7852" x="932.5" y="737.8789">V1: users + refresh_tokens</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="63.9258" x="932.5" y="749.3779">V2: categories</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="56.1426" x="932.5" y="760.877">V3: products</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="88.9404" x="932.5" y="772.376">V4: product_images</text></g><g class="entity" data-qualified-name="GMN78" data-source-line="184" id="ent0079"><path d="M1833.5,545 L1833.5,589.4971 A0,0 0 0 0 1833.5,589.4971 L2052.3955,589.4971 A0,0 0 0 0 2052.3955,589.4971 L2052.3955,555 L2042.3955,545 L1947,545 L1943,474.17 L1939,545 L1833.5,545 A0,0 0 0 0 1833.5,545" fill="#F9F8F4" style="stroke:#D3D1C7;stroke-width:1;"/><path d="M2042.3955,545 L2042.3955,555 L2052.3955,555 L2042.3955,545" fill="#F9F8F4" style="stroke:#D3D1C7;stroke-width:1;"/><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="197.8955" x="1839.5" y="559.3799">Almacenamiento de im&#225;genes de productos.</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="154.541" x="1839.5" y="570.8789">CloudinaryService gestiona upload</text><text fill="#5F5E5A" font-family="Arial" font-size="10" lengthAdjust="spacing" textLength="115.8936" x="1839.5" y="582.3779">y retorna URL + public_id.</text></g><!--link CLIENT to JF--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="111" id="lnk34"><path d="M1060,85.22 C1060,101.23 1060,113.3 1060,126.97" fill="none" id="CLIENT-to-JF" style="stroke:#5F5E