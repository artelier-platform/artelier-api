services:

  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Artelier API
  # ─────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "${SERVER_PORT}:8080"
    env_file:
      - .env
    environment:
      # Override DB_HOST to point to the postgres service
      DB_HOST: db
      # Override full datasource URL — removes sslmode=require for local dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:${DB_PORT}/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
