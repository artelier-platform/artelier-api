#################################
# APPLICATION
#################################

spring.application.name=artelier-api-test
server.port=8080

#################################
# DATABASE
#################################

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

#################################
# JPA
#################################

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

#################################
# FLYWAY
#################################

spring.flyway.enabled=false

#################################
# JWT
#################################

jwt.secret=test-secret-key-that-is-long-enough-for-testing-purposes-123456
jwt.expiration-ms=900000
jwt.refresh-expiration-days=7

#################################
# CLOUDINARY
#################################

cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test

#################################
# CORS
#################################

cors.allowed-origins=http://localhost:3000

#################################
# SWAGGER
#################################

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.path=/swagger

#################################
# ACTUATOR
#################################

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

#################################
# FILE UPLOAD
#################################

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#################################
# LOGGING
#################################

logging.level.root=WARN
logging.level.org.springframework.security=WARN

#################################
# WOMPI
#################################

wompi.events-key=test-events-key
wompi.public-key=test-public-key
wompi.private-key=test-private-key
wompi.integrity-secret=test-integrity-secret
wompi.base-url=http://localhost:8089
wompi.redirect-url=http://localhost:3000/payment/result

#################################
# CAFFEINE
#################################

spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=10m