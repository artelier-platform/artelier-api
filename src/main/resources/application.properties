#################################
# APPLICATION
#################################

spring.application.name=${APP_NAME}

server.port=${SERVER_PORT}

#################################
# DATABASE
#################################

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require

spring.datasource.username=${DB_USERNAME}

spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5

spring.datasource.hikari.minimum-idle=1

spring.datasource.hikari.idle-timeout=30000

#################################
# JPA
#################################

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}

spring.jpa.show-sql=${JPA_SHOW_SQL}

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

#################################
# FLYWAY
#################################

spring.flyway.enabled=${FLYWAY_ENABLED}

spring.flyway.locations=classpath:db/migration

spring.flyway.baseline-on-migrate=true

spring.flyway.schemas=public

#################################
# JWT
#################################

jwt.secret=${JWT_SECRET}

jwt.expiration-ms=${JWT_EXPIRATION_MS}

jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS}

#################################
# CLOUDINARY
#################################

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}

cloudinary.api-key=${CLOUDINARY_API_KEY}

cloudinary.api-secret=${CLOUDINARY_API_SECRET}

#################################
# CORS
#################################

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

#################################
# SWAGGER
#################################

springdoc.api-docs.enabled=${SWAGGER_ENABLED}

springdoc.swagger-ui.enabled=${SWAGGER_ENABLED}

springdoc.swagger-ui.path=/swagger

#################################
# ACTUATOR
#################################

management.endpoints.web.exposure.include=${ACTUATOR_EXPOSE}

management.endpoint.health.show-details=never

#################################
# FILE UPLOAD
#################################

spring.servlet.multipart.max-file-size=10MB

spring.servlet.multipart.max-request-size=10MB

#################################
# LOGGING
#################################

logging.level.root=INFO

logging.level.org.springframework.security=INFO